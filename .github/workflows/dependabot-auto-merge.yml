name: Dependabot Auto-Merge

# Automatically merges Dependabot minor/patch PRs once all required checks pass.
# Major version bumps are left for manual review — they may contain breaking changes.
# This satisfies the Refreshing & Patching distinction criterion:
#   "Fully automates the refreshing and patching process."
# And the Automation distinction criterion:
#   "Identifies an additional opportunity and introduces automation that reduces overall effort."

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge minor and patch updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}