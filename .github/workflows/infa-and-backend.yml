name: Infra & Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "infrastructure/**"
      - "backend/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "infrastructure/**"
      - "backend/**"

permissions:
  id-token: write
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run build (format, lint, test)
        run: |
          make build

      - name: Run Trivy vulnerability scanner (All Dependencies)
        # Scans backend + infrastructure dependencies:
        # - Backend Python (backend/requirements.txt)
        # - Infrastructure npm (package-lock.json)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"
          ignore-unfixed: true
        continue-on-error: false

  cdk-check:
    needs: backend-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Run infrastructure tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      - name: Run linting (TypeScript check)
        run: npx tsc --noEmit

      - name: CDK synth
        env:
          CDK_DEFAULT_ACCOUNT: "134667369518"
          CDK_DEFAULT_REGION: eu-west-2
          HOSTED_ZONE_ID: Z0000000000000
          ALPHA_CERT_ARN: arn:aws:acm:us-east-1:134667369518:certificate/placeholder
          PROD_CERT_ARN: arn:aws:acm:us-east-1:134667369518:certificate/placeholder
        run: npx cdk synth --no-lookups

  deploy-alpha:
    needs: [backend-tests, cdk-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Configure AWS Credentials (Alpha)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ALPHA_AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: eu-west-2

      - name: Verify AWS caller (Alpha)
        run: |
          echo "Deploying to ALPHA environment..."
          aws sts get-caller-identity

      - name: CDK deploy (Alpha)
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.ALPHA_AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: eu-west-2
          ENVIRONMENT: alpha
          BUDGET_ALERT_EMAIL: ${{ secrets.BUDGET_ALERT_EMAIL }}
          HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
          ALPHA_CERT_ARN: ${{ secrets.ALPHA_CERT_ARN }}
          PROD_CERT_ARN: ${{ secrets.PROD_CERT_ARN }}
        run: npx cdk deploy ServiceStack --require-approval never

  integration-tests-alpha:
    needs: deploy-alpha
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS Credentials (Alpha)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ALPHA_AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: eu-west-2

      - name: Get Alpha API URL from CloudFormation
        id: get-api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ServiceStack \
            --query "Stacks[0].Outputs[?OutputKey==\`ApiUrl\`].OutputValue" \
            --output text)
          echo "ALPHA_API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "Alpha API URL: $API_URL"

      - name: Run integration tests against Alpha
        run: pytest tests/test_alpha_integration.py -v

  deploy-prod:
    needs: [deploy-alpha, integration-tests-alpha]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    environment:
      name: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Configure AWS Credentials (Prod)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.PROD_AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: eu-west-2

      - name: Verify AWS caller (Prod)
        run: |
          echo "Deploying to PRODUCTION environment..."
          aws sts get-caller-identity

      - name: CDK deploy (Prod)
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.PROD_AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: eu-west-2
          ENVIRONMENT: prod
          BUDGET_ALERT_EMAIL: ${{ secrets.BUDGET_ALERT_EMAIL }}
          HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
          ALPHA_CERT_ARN: ${{ secrets.ALPHA_CERT_ARN }}
          PROD_CERT_ARN: ${{ secrets.PROD_CERT_ARN }}
        run: npx cdk deploy ServiceStack --require-approval never
